openapi: 3.0.0
info:
  title: DSA Tracker Backend API
  description: |
    A comprehensive API for tracking DSA (Data Structures and Algorithms) progress for students.
    
    Features:
    - Student authentication and progress tracking
    - Admin management with role-based access control
    - Question assignment and visibility management
    - Leaderboard system with multiple time periods
    - Batch and topic management
    - Real-time progress synchronization
    
    ## Authentication
    The API uses JWT Bearer tokens for authentication. Include the token in the Authorization header:
    `Authorization: Bearer <your-jwt-token>`
    
    ## Role-Based Access Control
    - **STUDENT**: Access to personal progress, topics, classes, and questions
    - **INTERN**: Basic admin access to batch-specific data
    - **TEACHER**: Full admin access with content management
    - **SUPERADMIN**: System-wide administrative access
  version: 1.0.0
  contact:
    name: DSA Tracker Team
    email: support@dsatracker.com
  license:
    name: ISC
    url: https://github.com/dhruv608/DSA-Tracker-Backend/blob/main/LICENSE

servers:
  - url: http://localhost:5000
    description: Local development server
  - url: https://api.dsatracker.com
    description: Production server

tags:
  - name: Authentication
    description: Authentication and authorization endpoints
  - name: Students
    description: Student-specific endpoints for progress tracking and profile management
  - name: Admin
    description: Admin endpoints for content and batch management
  - name: SuperAdmin
    description: SuperAdmin endpoints for system administration
  - name: Leaderboard
    description: Leaderboard and ranking endpoints
  - name: Topics
    description: Topic management endpoints
  - name: Questions
    description: Question management and assignment endpoints
  - name: Classes
    description: Class management endpoints
  - name: Cities
    description: City management endpoints
  - name: Batches
    description: Batch management endpoints
  - name: System
    description: System health and utility endpoints

paths:
  # Health Check
  /health:
    get:
      tags:
        - System
      summary: Health check endpoint
      description: Returns the current status of the API server
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time
                    example: "2024-01-01T00:00:00.000Z"

  # Authentication Routes
  /api/auth/student/register:
    post:
      tags:
        - Authentication
      summary: Register a new student
      description: Register a new student account with email, username, and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - username
                - password
                - batch_id
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: "John Doe"
                email:
                  type: string
                  format: email
                  pattern: "^[^@]+@pwioi\\.com$"
                  maxLength: 150
                  description: Must be a @pwioi.com email address
                  example: "john.doe@pwioi.com"
                username:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: "johndoe"
                password:
                  type: string
                  minLength: 6
                  example: "password123"
                enrollment_id:
                  type: string
                  maxLength: 100
                  example: "ENR2024001"
                batch_id:
                  type: integer
                  example: 1
                leetcode_id:
                  type: string
                  maxLength: 100
                  example: "johndoe_lc"
                gfg_id:
                  type: string
                  maxLength: 100
                  example: "johndoe_gfg"
      responses:
        '201':
          description: Student registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student registered successfully"
                  user:
                    $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/student/login:
    post:
      tags:
        - Authentication
      summary: Student login
      description: Authenticate a student with email/username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
              properties:
                email:
                  type: string
                  format: email
                  pattern: "^[^@]+@pwioi\\.com$"
                  description: Must be a @pwioi.com email address
                  example: "john.doe@pwioi.com"
                username:
                  type: string
                  example: "johndoe"
                password:
                  type: string
                  example: "password123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/StudentAuth'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/student/logout:
    post:
      tags:
        - Authentication
      summary: Student logout
      description: Logout a student by clearing their refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Student logout successful"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/admin/login:
    post:
      tags:
        - Authentication
      summary: Admin login
      description: Authenticate an admin with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  pattern: "^[^@]+@pwioi\\.com$"
                  description: Must be a @pwioi.com email address
                  example: "admin@pwioi.com"
                password:
                  type: string
                  example: "adminpassword"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  accessToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/AdminAuth'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/admin/logout:
    post:
      tags:
        - Authentication
      summary: Admin logout
      description: Logout an admin by clearing their refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Admin logout successful"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Forgot password - Send OTP
      description: Send a 6-digit OTP to the user's email for password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  pattern: "^[^@]+@pwioi\\.com$"
                  description: Must be a @pwioi.com email address
                  example: "student@pwioi.com"
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "OTP sent to your email address"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password with OTP
      description: Reset password using the OTP sent to email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - otp
                - newPassword
              properties:
                email:
                  type: string
                  format: email
                  pattern: "^[^@]+@pwioi\\.com$"
                  description: Must be a @pwioi.com email address
                  example: "student@pwioi.com"
                otp:
                  type: string
                  pattern: "^[0-9]{6}$"
                  description: 6-digit OTP received via email
                  example: "123456"
                newPassword:
                  type: string
                  minLength: 6
                  description: New password (minimum 6 characters)
                  example: "newpassword123"
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password reset successful. You can now login with your new password."
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "User not found"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Generate a new access token using a valid refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Valid refresh token
                  example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Access token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    description: New JWT access token (valid for 15 minutes)
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        '400':
          description: Refresh token required
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Refresh token required"
        '403':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid refresh token"
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/google-login:
    post:
      tags:
        - Authentication
      summary: Google OAuth login
      description: Authenticate using Google OAuth token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - idToken
              properties:
                idToken:
                  type: string
                  description: Google OAuth ID token
                  example: "eyJhbGciOiJSUzI1NiIsImtpZCI6Ij..."
      responses:
        '200':
          description: Google login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Google login successful"
                  accessToken:
                    type: string
                    description: JWT access token (valid for 15 minutes)
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  refreshToken:
                    type: string
                    description: JWT refresh token (valid for 7 days)
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/StudentAuth'
        '400':
          description: Invalid Google token or email domain
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Only @pwioi.com email addresses are allowed"
        '403':
          description: Student not registered by admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Student not registered by admin"
        '401':
          description: Invalid Google token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Invalid Google token"
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Student Routes
  /api/students/topics:
    get:
      tags:
        - Students
        - Topics
      summary: Get topics with batch progress
      description: Get all topics with batch-specific classes and student progress
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TopicWithProgress'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/topics/{topicSlug}:
    get:
      tags:
        - Students
        - Topics
      summary: Get topic overview with classes summary
      description: Get topic overview with classes summary for a specific topic
      security:
        - bearerAuth: []
      parameters:
        - name: topicSlug
          in: path
          required: true
          description: Topic slug identifier
          schema:
            type: string
            example: "arrays-and-strings"
      responses:
        '200':
          description: Topic overview retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopicOverview'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/topics/{topicSlug}/classes/{classSlug}:
    get:
      tags:
        - Students
        - Classes
      summary: Get class details with full questions
      description: Get class details with full questions array and student progress
      security:
        - bearerAuth: []
      parameters:
        - name: topicSlug
          in: path
          required: true
          description: Topic slug identifier
          schema:
            type: string
            example: "arrays-and-strings"
        - name: classSlug
          in: path
          required: true
          description: Class slug identifier
          schema:
            type: string
            example: "introduction-to-arrays"
      responses:
        '200':
          description: Class details retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassDetailsWithQuestions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/addedQuestions:
    get:
      tags:
        - Students
        - Questions
      summary: Get all questions with filters
      description: Get all questions with filters and solved status for student's batch
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          description: Search term for question names
          schema:
            type: string
            example: "binary search"
        - name: topic
          in: query
          description: Filter by topic slug
          schema:
            type: string
            example: "arrays-and-strings"
        - name: level
          in: query
          description: Filter by difficulty level
          schema:
            type: string
            enum: [EASY, MEDIUM, HARD]
            example: "MEDIUM"
        - name: platform
          in: query
          description: Filter by platform
          schema:
            type: string
            enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
            example: "LEETCODE"
        - name: type
          in: query
          description: Filter by question type
          schema:
            type: string
            enum: [HOMEWORK, CLASSWORK]
            example: "HOMEWORK"
        - name: solved
          in: query
          description: Filter by solved status
          schema:
            type: string
            enum: [true, false]
            example: "true"
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Number of items per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
      responses:
        '200':
          description: Questions retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/responses/PaginatedQuestions'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/leaderboard:
    post:
      tags:
        - Students
        - Leaderboard
      summary: Get student leaderboard
      description: Get leaderboard with top 10 students and personal rank
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                city:
                  type: string
                  description: Filter by city name or 'all'
                  example: "all"
                type:
                  type: string
                  description: Time period type
                  enum: [all, weekly, monthly, alltime]
                  default: all
                  example: "all"
                year:
                  type: integer
                  description: Filter by batch year
                  example: 2024
      parameters:
        - name: username
          in: query
          description: Search for specific username
          schema:
            type: string
            example: "johndoe"
      responses:
        '200':
          description: Leaderboard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentLeaderboard'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/profile:
    get:
      tags:
        - Students
      summary: Get student profile
      description: Get complete student profile with all sections
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Student profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/students/profile/{username}:
    get:
      tags:
        - Students
      summary: Get public student profile
      description: Get public profile of a student by username
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          description: Student username
          schema:
            type: string
            example: "johndoe"
      responses:
        '200':
          description: Public profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicStudentProfile'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # Admin Routes
  /api/admin/cities:
    get:
      tags:
        - Admin
        - Cities
      summary: Get all cities
      description: Get all cities with optional search filter
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          description: Search term for city names
          schema:
            type: string
            example: "mumbai"
      responses:
        '200':
          description: Cities retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/batches:
    get:
      tags:
        - Admin
        - Batches
      summary: Get all batches
      description: Get all batches with optional city and year filters
      security:
        - bearerAuth: []
      parameters:
        - name: city
          in: query
          description: Filter by city name
          schema:
            type: string
            example: "mumbai"
        - name: year
          in: query
          description: Filter by batch year
          schema:
            type: integer
            example: 2024
      responses:
        '200':
          description: Batches retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Batch'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/topics:
    get:
      tags:
        - Admin
        - Topics
      summary: Get all topics
      description: Get all topics globally
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Topics retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Topic'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/topics:
    post:
      tags:
        - Admin
        - Topics
      summary: Create a new topic
      description: Create a new topic (Teacher or above only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic_name
              properties:
                topic_name:
                  type: string
                  minLength: 1
                  maxLength: 150
                  example: "Arrays and Strings"
      responses:
        '201':
          description: Topic created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic created successfully"
                  topic:
                    $ref: '#/components/schemas/Topic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/topics/{id}:
    patch:
      tags:
        - Admin
        - Topics
      summary: Update a topic
      description: Update an existing topic (Teacher or above only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Topic ID
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topic_name
              properties:
                topic_name:
                  type: string
                  minLength: 1
                  maxLength: 150
                  example: "Updated Topic Name"
      responses:
        '200':
          description: Topic updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic updated successfully"
                  topic:
                    $ref: '#/components/schemas/Topic'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/topics/{id}:
    delete:
      tags:
        - Admin
        - Topics
      summary: Delete a topic
      description: Delete an existing topic (Teacher or above only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Topic ID
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Topic deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Topic deleted successfully"
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/admin/questions:
    get:
      tags:
        - Admin
        - Questions
      summary: Get all questions
      description: Get all questions with optional filters
      security:
        - bearerAuth: []
      parameters:
        - name: topicSlug
          in: query
          description: Filter by topic slug
          schema:
            type: string
            example: "arrays-and-strings"
        - name: level
          in: query
          description: Filter by difficulty level
          schema:
            type: string
            enum: [EASY, MEDIUM, HARD]
            example: "MEDIUM"
        - name: platform
          in: query
          description: Filter by platform
          schema:
            type: string
            enum: [LEETCODE, GFG, OTHER, INTERVIEWBIT]
            example: "LEETCODE"
        - name: type
          in: query
          description: Filter by question type
          schema:
            type: string
            enum: [HOMEWORK, CLASSWORK]
