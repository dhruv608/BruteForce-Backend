components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Base Schemas
    Pagination:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          example: 1
        limit:
          type: integer
          minimum: 1
          maximum: 100
          example: 20
        total:
          type: integer
          minimum: 0
          example: 200
        totalPages:
          type: integer
          minimum: 0
          example: 10

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Error message"
        message:
          type: string
          example: "Detailed error message"

    # Enum Schemas
    Platform:
      type: string
      enum:
        - LEETCODE
        - GFG
        - OTHER
        - INTERVIEWBIT
      example: "LEETCODE"

    Level:
      type: string
      enum:
        - EASY
        - MEDIUM
        - HARD
      example: "MEDIUM"

    QuestionType:
      type: string
      enum:
        - HOMEWORK
        - CLASSWORK
      example: "HOMEWORK"

    AdminRole:
      type: string
      enum:
        - SUPERADMIN
        - TEACHER
        - INTERN
      example: "TEACHER"

    # Entity Schemas
    City:
      type: object
      properties:
        id:
          type: integer
          example: 1
        city_name:
          type: string
          maxLength: 100
          example: "Mumbai"
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"

    Batch:
      type: object
      properties:
        id:
          type: integer
          example: 1
        batch_name:
          type: string
          maxLength: 50
          example: "Batch 1"
        year:
          type: integer
          example: 2024
        city_id:
          type: integer
          example: 1
        slug:
          type: string
          maxLength: 100
          example: "mumbai-2024-batch1"
        easy_assigned:
          type: integer
          example: 10
        medium_assigned:
          type: integer
          example: 15
        hard_assigned:
          type: integer
          example: 5
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        city:
          $ref: '#/components/schemas/City'

    Student:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 100
          example: "John Doe"
        email:
          type: string
          format: email
          maxLength: 150
          example: "john.doe@example.com"
        username:
          type: string
          maxLength: 100
          example: "johndoe"
        enrollment_id:
          type: string
          maxLength: 100
          example: "ENR2024001"
        city_id:
          type: integer
          example: 1
        batch_id:
          type: integer
          example: 1
        leetcode_id:
          type: string
          maxLength: 100
          example: "johndoe_lc"
        gfg_id:
          type: string
          maxLength: 100
          example: "johndoe_gfg"
        github:
          type: string
          maxLength: 100
          example: "johndoe"
        linkedin:
          type: string
          maxLength: 150
          example: "johndoe"
        gfg_total_solved:
          type: integer
          example: 50
        lc_total_solved:
          type: integer
          example: 75
        last_synced_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-01-01T00:00:00Z"
        batch:
          $ref: '#/components/schemas/Batch'
        city:
          $ref: '#/components/schemas/City'

    StudentAuth:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        username:
          type: string
          example: "johndoe"
        city:
          $ref: '#/components/schemas/City'
        batch:
          $ref: '#/components/schemas/Batch'
        leetcode_id:
          type: string
          example: "johndoe_lc"
        gfg_id:
          type: string
          example: "johndoe_gfg"
        cityId:
          type: integer
          example: 1
        cityName:
          type: string
          example: "Mumbai"
        batchId:
          type: integer
          example: 1
